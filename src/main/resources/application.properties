# Database Configuration
spring.datasource.url=jdbc:h2:mem:workoutdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console (useful for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Application Configuration
server.port=8080
logging.level.com.workoutplanner=INFO

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890abcdefghijklmnopqrstuvwxyz
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123

# Beta Mode Configuration (security enabled by default - only disable with BETA=true)
beta.mode=${BETA:false}