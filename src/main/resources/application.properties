# PostgreSQL Database Configuration (Environment Variable Driven)
# Use DATABASE_URL only if it starts with jdbc:, otherwise construct from components
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/workoutdb}
spring.datasource.driver-class-name=org.postgresql.Driver
# Only set username/password if DATABASE_URL doesn't contain credentials
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}

# Connection Pool Configuration
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:20000}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:25}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:300000}
spring.datasource.hikari.pool-name=WorkoutHikariCP
spring.datasource.hikari.auto-commit=true

# JPA Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.connection.charSet=UTF-8

# Flyway Database Migration Configuration
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.validate-on-migrate=${FLYWAY_VALIDATE_ON_MIGRATE:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# Application Configuration
server.port=8080
logging.level.com.workoutplanner=INFO

# Jackson Configuration
spring.jackson.property-naming-strategy=SNAKE_CASE

# JWT Configuration
jwt.secret=mySecretKey123456789012345678901234567890abcdefghijklmnopqrstuvwxyz
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123

# Security Configuration
beta.mode=${BETA:false}

# Development Mode Settings (for local development)
# Set these environment variables for easier development:
# DDL_AUTO=create-drop (to recreate tables on restart)
# JPA_SHOW_SQL=true (to see SQL queries)
# JPA_FORMAT_SQL=true (to format SQL output)

# MinIO Object Storage Configuration
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:${MINIO_ROOT_USER:minioadmin}}
minio.secret-key=${MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD:minioadmin}}
minio.bucket-name=${MINIO_BUCKET_NAME:workout-plans}
minio.region=${MINIO_REGION:us-east-1}

# Auto-create bucket if not exists
minio.auto-create-bucket=${MINIO_AUTO_CREATE_BUCKET:true}

# Storage Configuration
# Set to true to use local file storage instead of MinIO/S3 for development
storage.use-local=${STORAGE_USE_LOCAL:false}
storage.local.path=${STORAGE_LOCAL_PATH:./local-storage}

# For production MinIO deployment
# minio.endpoint=https://minio.yourdomain.com
# minio.access-key=your-access-key
# minio.secret-key=your-secret-key

# RevenueCat Configuration
revenuecat.api.key=${REVENUECAT_API_KEY:}
revenuecat.webhook.secret=${REVENUECAT_WEBHOOK_SECRET:}
revenuecat.app.id=${REVENUECAT_APP_ID:}
revenuecat.environment=${REVENUECAT_ENVIRONMENT:development}

# Billing Configuration
billing.premium.enabled=${BILLING_PREMIUM_ENABLED:true}
billing.free.tier.limits.plans=${BILLING_FREE_PLANS_LIMIT:3}
billing.free.tier.limits.exports=${BILLING_FREE_EXPORTS_LIMIT:1}

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-3.5-turbo-1106}
openai.api.url=${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}