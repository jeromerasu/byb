# Test Profile Configuration - Uses In-Memory H2 Database for Local Testing
# This profile allows testing without external dependencies like PostgreSQL or MinIO

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Enable H2 Console for debugging (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Disable Flyway for tests (H2 creates tables automatically)
spring.flyway.enabled=false

# Application Configuration
server.port=8083
logging.level.com.workoutplanner=INFO
logging.level.org.springframework.security=DEBUG

# JWT Configuration (same as main)
jwt.secret=mySecretKey123456789012345678901234567890abcdefghijklmnopqrstuvwxyz
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123

# Test Mode
beta.mode=true

# Local File Storage (no MinIO needed)
storage.use-local=true
storage.local.path=./test-storage

# Disable RevenueCat for testing
revenuecat.api.key=test-key
revenuecat.webhook.secret=test-secret
revenuecat.app.id=test-app
revenuecat.environment=development

# Billing Configuration for testing
billing.premium.enabled=true
billing.free.tier.limits.plans=3
billing.free.tier.limits.exports=1

# Queue Scanner Configuration (TASK-BE-015)
queue.scanner.enabled=true
queue.scanner.batch-size=5
queue.scanner.fixed-delay-ms=30000
queue.scanner.lock-timeout-minutes=10

# Queue Retry Configuration (TASK-BE-016D)
queue.retry.base-delay-seconds=60
queue.retry.max-delay-seconds=3600