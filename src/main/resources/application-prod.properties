# Production Configuration for Render deployment
# Database configuration is handled by DatabaseConfig class

# Connection Pool Configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=WorkoutHikariCP
spring.datasource.hikari.auto-commit=true

# JPA Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.connection.charSet=UTF-8

# Flyway Database Migration Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# Application Configuration
server.port=${PORT:8080}
logging.level.com.workoutplanner=INFO

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890abcdefghijklmnopqrstuvwxyz}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Beta mode disabled in production
beta.mode=false

# Storage Configuration - use local storage for now
storage.use-local=true
storage.local.path=/tmp/workout-storage

# RevenueCat Configuration
revenuecat.api.key=${REVENUECAT_API_KEY:}
revenuecat.webhook.secret=${REVENUECAT_WEBHOOK_SECRET:}
revenuecat.app.id=${REVENUECAT_APP_ID:}
revenuecat.environment=production

# Billing Configuration
billing.premium.enabled=true
billing.free.tier.limits.plans=3
billing.free.tier.limits.exports=1